{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4"><i class="fas fa-edit"></i> تعديل العقار</h2>

    <form method="post" enctype="multipart/form-data" class="border p-4 bg-white shadow-sm rounded">
        {% csrf_token %}
        {{ form.as_p }}

        <!-- ✅ عرض الصور الحالية -->
        <div class="mb-3">
            <label class="form-label">الصور الحالية:</label>
            <div class="d-flex flex-wrap gap-2">
                {% for image in property.propertyimage_set.all %}
                <div class="position-relative">
                    <img src="{{ image.image.url }}" alt="صورة" style="height: 120px; width: auto;" class="border rounded">
                    <a href="{% url 'delete_property_image' image.id %}" class="btn btn-sm btn-danger position-absolute top-0 end-0" onclick="return confirm('هل تريد حذف هذه الصورة؟')">
                        <i class="fas fa-trash-alt"></i>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- ✅ رفع صور جديدة -->
        <div class="mb-3">
            <label class="form-label"><i class="fas fa-images"></i> رفع صور جديدة</label>
            <input type="file" name="images" class="form-control" multiple>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> حفظ التعديلات
            </button>
            <a href="{% url 'my_properties' %}" class="btn btn-secondary">رجوع</a>
        </div>
    </form>
</div>
{% endblock %}
