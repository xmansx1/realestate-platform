<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تأكيد حذف الطلب</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow-sm">
    <h3 class="mb-4 text-center text-danger">هل أنت متأكد أنك تريد حذف هذا الطلب؟</h3>

    <p><strong>المدينة:</strong> {{ request_obj.city }}</p>
    <p><strong>الحي:</strong> {{ request_obj.district }}</p>
    <p><strong>نوع الطلب:</strong> {{ request_obj.get_request_type_display }}</p>

    <form method="POST">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">نعم، احذف</button>
        <a href="{% url 'my_requests' %}" class="btn btn-secondary">إلغاء</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
