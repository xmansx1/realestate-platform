{% extends 'base.html' %}
{% block title %}حذف العقار{% endblock %}
{% block content %}
<div class="alert alert-danger text-center">
  <p>هل أنت متأكد من حذف العقار <strong>{{ property }}</strong>؟</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">تأكيد الحذف</button>
    <a href="{% url 'my_properties' %}" class="btn btn-secondary">إلغاء</a>
  </form>
</div>
{% endblock %}
