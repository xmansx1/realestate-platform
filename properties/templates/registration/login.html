<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm p-4 mx-auto" style="max-width: 400px;">
        <h2 class="mb-4 text-center">تسجيل الدخول</h2>

        {% if form.errors %}
            <div class="alert alert-danger">اسم المستخدم أو كلمة المرور غير صحيحة.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label">اسم المستخدم</label>
                <input type="text" name="username" id="id_username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="id_password" class="form-label">كلمة المرور</label>
                <input type="password" name="password" id="id_password" class="form-control" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">تسجيل الدخول</button>
            </div>
        </form>

        <p class="text-center">
            <p>لا تملك حساباً؟ <a href="{% url 'signup' %}">سجل الآن</a></p>

        </p>
        
    </div>
</div>

</body>
</html>
