<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب جديد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 15px;
        }
        .btn-success {
            background-color: #28a745;
            border: none;
        }
        .btn-success:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    {% if messages %}
    <div class="container mt-3">
        {% for message in messages %}
            <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-danger{% endif %} text-center">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}

<div class="container mt-5">
    <div class="card shadow-lg p-4 mx-auto" style="max-width: 400px;">
        <h3 class="mb-4 text-center">إنشاء حساب جديد</h3>

        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="id_username" class="form-label">اسم المستخدم</label>
                <input type="text" name="username" id="id_username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="id_password1" class="form-label">كلمة المرور</label>
                <input type="password" name="password1" id="id_password1" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="id_password2" class="form-label">تأكيد كلمة المرور</label>
                <input type="password" name="password2" id="id_password2" class="form-control" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-success">تسجيل</button>
            </div>
        </form>

        <p class="text-center mt-3">
            لديك حساب؟ <a href="{% url 'login' %}">تسجيل الدخول</a>
        </p>
    </div>
</div>

</body>
</html>
